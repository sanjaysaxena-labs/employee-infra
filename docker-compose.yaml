networks:
  employee-network:
    driver: bridge
    name: employee-network

volumes:
  mysql_data:
  rabbitmq_data:
  keycloak_data:
  prometheus_data:
  grafana_data:

services:

  # =========================================================================
  # 1. PERSISTENCE LAYER (MySQL)
  # =========================================================================
  mysql:
    image: mysql:8.0
    container_name: employee-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_pass
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin_secure_pass
      MYSQL_DATABASE: employee_shared_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - employee-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secure_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================================================================
  # 2. IDENTITY AND ACCESS MANAGEMENT (Keycloak)
  # =========================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: employee-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_secure_pass
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/employee_shared_db
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: admin_secure_pass
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - employee-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # =========================================================================
  # 3. MESSAGE BROKER (RabbitMQ)
  # =========================================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: employee-rabbitmq
    ports:
      - "5672:5672"     # AMQP communication port
      - "15672:15672"   # Management Dashboard Dashboard
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - employee-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================================================================
  # 4. OBSERVABILITY: METRIC COLLECTION ENGINE (Prometheus)
  # =========================================================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: employee-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - employee-network
    restart: unless-stopped

  # =========================================================================
  # 5. OBSERVABILITY: VISUALIZATION DASHBOARD (Grafana)
  # =========================================================================
  grafana:
    image: grafana/grafana:10.4.1
    container_name: employee-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin_secure_pass
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - employee-network
    depends_on:
      - prometheus
    restart: unless-stopped